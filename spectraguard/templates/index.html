<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRA GUARD // SOC</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #0f0f0f;
            --border: #333;
            --primary: #00ff41;
            --danger: #ff003c;
            --text: #ccc;
            --peak: #ffe600;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 15px; height: 100vh;
            box-sizing: border-box; overflow: hidden;
        }

        /* LAYOUT */
        .grid {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            /* Keep bottom row fixed so logs/controls won't expand vertically */
            grid-template-rows: 60px 1fr 240px;
            gap: 15px; height: 100%;
        }

        /* PANELS */
        .panel {
            background: var(--panel); border: 1px solid var(--border);
            padding: 10px; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            /* FIX: Prevents panels from collapsing too small */
            min-height: 0;
        }

        /* Specific height for the bottom panels to ensure they don't get squashed */
        .controls, .logs {
            min-height: 200px;
        }

        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); }
        h1 { margin: 0; font-size: 1.8em; letter-spacing: 3px; color: #fff; }

        .panel h3 { margin-top: 0; margin-bottom: 10px; font-size: 1.1em; color: #fff; }

        /* STATUS */
        .status-box { grid-row: 2; align-items: center; text-align: center; justify-content: center; }
        .big-status { font-size: 3em; font-weight: bold; margin: 20px 0; text-shadow: 0 0 20px currentColor; }
        .safe { color: var(--primary); }
        .danger { color: var(--danger); animation: blink 0.5s infinite; }

        /* VISUALIZER */
        .visualizer { grid-column: 2; grid-row: 2; padding: 0; background: #000; border: 1px solid #444; position: relative; cursor: crosshair; }
        canvas { width: 100%; height: 100%; display: block; }

        #inspector {
            position: absolute; pointer-events: none; background: rgba(0,0,0,0.8);
            border: 1px solid var(--primary); padding: 5px; font-size: 0.8em; color: #fff;
            display: none; z-index: 100;
        }

        /* NODES LIST */
        .node-list { grid-column: 3; grid-row: 2; overflow-y: auto; }
        .node-card {
            background: #1a1a1a; border-left: 3px solid #666; margin-bottom: 8px; padding: 8px;
            font-size: 0.85em; transition: 0.3s;
        }
        .node-card.ONLINE { border-color: var(--primary); }
        .node-card.EVADING { border-color: var(--danger); background: #220000; }
        .node-card.FREQ_CHANGED { border-color: #ffe600; background: #222200; }

        /* CONTROLS */
        .controls { grid-column: 3; grid-row: 3; gap: 8px; overflow-y: auto; }
        button {
            background: #222; color: var(--primary); border: 1px solid var(--primary);
            padding: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase;
            transition: 0.2s;
        }
        button:hover { background: var(--primary); color: #000; }
        button.emergency { border-color: var(--danger); color: var(--danger); font-size: 1.1em; padding: 15px; }
        button.emergency:hover { background: var(--danger); color: #fff; }

        /* LOGS */
        .logs { grid-column: 1 / 3; grid-row: 3; font-size: 0.8em; overflow-y: auto; font-family: monospace; }
        .logs { padding-right: 6px; }
        .log-entry { border-bottom: 1px solid #111; padding: 2px 0; }
        .log-entry:first-child { color: #fff; font-weight: bold; }
        /* Ensure logs area won't expand and will scroll */
        .logs::-webkit-scrollbar { width: 10px; }
        .logs::-webkit-scrollbar-thumb { background: #222; border-radius: 5px; }

        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="grid">
    <div class="header">
        <h1>SPECTRA<span style="color:var(--primary)">GUARD</span></h1>
        <div style="font-size:0.8em; color:var(--primary)">SYSTEM ACTIVE // V4.20</div>
    </div>

    <!-- LEFT: STATUS -->
    <div class="panel status-box">
        <h3>THREAT LEVEL</h3>
        <div id="statusText" class="big-status safe">CONNECTING</div>
        <div style="font-size:1.2em; margin-bottom:10px;">
            CONFIDENCE: <span id="confVal" style="color:var(--primary); font-weight:bold;">0%</span>
        </div>
        <div style="font-size:0.9em; color:#666">
            SCANNING: <span id="freqVal" style="color:#fff">---</span> MHz
        </div>
    </div>

    <!-- CENTER: DUAL SCOPE -->
    <div class="panel visualizer" id="vizPanel">
        <canvas id="scope"></canvas>
        <div id="inspector"></div>
    </div>

    <!-- RIGHT: NODES -->
    <div class="panel node-list" id="nodeContainer">
        <div style="text-align:center; color:#444; margin-top:20px;">WAITING FOR NODES...</div>
    </div>

    <!-- BOTTOM LEFT: LOGS -->
    <div class="panel logs" id="logBox"></div>

    <!-- BOTTOM RIGHT: CONTROLS -->
    <div class="panel controls">
        <h3>COMMANDS</h3>
        <button class="emergency" onclick="hop(923.3)">☢️ EVASIVE HOP</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <button onclick="hop(905.3)">CH 1</button>
            <button onclick="hop(915.0)">CH 5</button>
            <button onclick="hop(927.5)">CH 9</button>
            <button onclick="hop(903.5)">CH 0</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');
    const vizPanel = document.getElementById('vizPanel');
    const inspector = document.getElementById('inspector');

    // Config
    const MIN_DB = -90;
    const MAX_DB = -20;
    const START_FREQ = 902;
    const END_FREQ = 928;

    let waterfallRows = [];
    let peaks = [];
    let currentSpectrum = [];

    function resize() {
        if (!canvas.parentElement) return;
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.onresize = resize;
    resize();

    // *** CRITICAL FIX: Loop Logic Changed ***
    function update() {
        fetch('/data')
            .then(r => r.json())
            .then(data => {
                const isJammed = data.status === "JAMMED";
                const primaryColor = isJammed ? '#ff003c' : '#00ff41';
                document.documentElement.style.setProperty('--primary', primaryColor);

                // UI Text
                const sEl = document.getElementById('statusText');
                if (sEl) {
                    sEl.innerText = data.status;
                    sEl.className = isJammed ? "big-status danger" : "big-status safe";
                }
                document.getElementById('confVal').innerText = (data.confidence*100).toFixed(0) + "%";
                document.getElementById('freqVal').innerText = data.freq.toFixed(1);

                // DRAW SCOPE
                ctx.fillStyle = '#000';
                ctx.fillRect(0,0,canvas.width, canvas.height);

                const H_TOP = canvas.height * 0.25; // smaller top area -> bigger waterfall
                const H_BOT = canvas.height - H_TOP;

                currentSpectrum = data.spectrum || [];
                // Even if no data, we proceed to ensure the loop continues

                if (currentSpectrum.length > 0) {
                    // 1. PEAK HOLD
                    if (peaks.length !== currentSpectrum.length) peaks = new Array(currentSpectrum.length).fill(MIN_DB);
                    for(let i=0; i<currentSpectrum.length; i++) {
                        if (currentSpectrum[i] > peaks[i]) peaks[i] = currentSpectrum[i];
                        else peaks[i] -= 0.5;
                    }

                    // 2. DRAW WATERFALL (draw first so overlays appear on top)
                    waterfallRows.unshift({data: [...currentSpectrum], jammed: isJammed});
                    if(waterfallRows.length > H_BOT) waterfallRows.pop();

                    waterfallRows.forEach((row, rIndex) => {
                        const y = H_TOP + rIndex;
                        const rowW = canvas.width / row.data.length;
                        for(let c=0; c<row.data.length; c++) {
                            const val = row.data[c];
                            const norm = Math.max(0, Math.min(1, (val - MIN_DB) / (MAX_DB - MIN_DB)));

                            let color;
                            if(row.jammed) {
                                color = `rgb(${norm*255}, 0, 0)`;
                            } else {
                                if (norm < 0.3) color = `rgb(0, 0, ${norm*255})`;
                                else if (norm < 0.7) color = `rgb(0, ${norm*200}, ${norm*100})`;
                                else color = `rgb(${norm*255}, 255, 0)`;
                            }
                            ctx.fillStyle = color;
                            ctx.fillRect(c*rowW, y, rowW+1, 1);
                        }
                    });

                    // 3. GRID (draw on top so it remains visible)
                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    for(let f=START_FREQ; f<=END_FREQ; f+=4) {
                        const x = ((f - START_FREQ) / (END_FREQ - START_FREQ)) * canvas.width;
                        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                        ctx.fillStyle = '#666'; ctx.font = "10px monospace";
                        ctx.fillText(f, x+2, canvas.height - 5);
                    }
                    for(let db=MIN_DB; db<=MAX_DB; db+=10) {
                        const norm = (db - MIN_DB) / (MAX_DB - MIN_DB);
                        const y = H_TOP - (norm * H_TOP);
                        ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
                        ctx.fillText(db, 2, y-2);
                    }
                    ctx.stroke();

                    // 4. DRAW PEAKS (overlay)
                    const step = canvas.width / currentSpectrum.length;
                    ctx.beginPath();
                    ctx.strokeStyle = '#ffe600';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([2, 2]);
                    for(let i=0; i<peaks.length; i++) {
                        const norm = Math.max(0, (peaks[i] - MIN_DB) / (MAX_DB - MIN_DB));
                        const y = H_TOP - (norm * H_TOP);
                        if(i===0) ctx.moveTo(0, y); else ctx.lineTo(i*step, y);
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // 5. DRAW POWER (overlay)
                    ctx.beginPath();
                    ctx.strokeStyle = primaryColor;
                    ctx.lineWidth = 2;
                    ctx.fillStyle = isJammed ? 'rgba(255, 0, 60, 0.2)' : 'rgba(0, 255, 65, 0.2)';
                    ctx.moveTo(0, H_TOP);
                    for(let i=0; i<currentSpectrum.length; i++) {
                        const val = currentSpectrum[i];
                        const norm = Math.max(0, (val - MIN_DB) / (MAX_DB - MIN_DB));
                        const y = H_TOP - (norm * H_TOP);
                        ctx.lineTo(i*step, y);
                    }
                    ctx.lineTo(canvas.width, H_TOP);
                    ctx.fill();
                    ctx.stroke();

                    // 6. Draw node / pending markers on top
                    try {
                        if (data.freq && data.freq > 0) {
                            const nodeX = ((data.freq - START_FREQ) / (END_FREQ - START_FREQ)) * canvas.width;
                            ctx.save();
                            ctx.strokeStyle = '#00ffff';
                            ctx.lineWidth = 1;
                            ctx.setLineDash([4,4]);
                            ctx.beginPath();
                            ctx.moveTo(nodeX, H_TOP);
                            ctx.lineTo(nodeX, canvas.height);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.fillStyle = '#00ffff';
                            ctx.fillText(`${data.freq.toFixed(1)} MHz`, Math.min(nodeX+4, canvas.width-60), H_TOP+10);
                            ctx.restore();
                        }
                        if (data.pending_hop) {
                            const px = ((data.pending_hop - START_FREQ) / (END_FREQ - START_FREQ)) * canvas.width;
                            ctx.save();
                            ctx.strokeStyle = '#ffff00';
                            ctx.lineWidth = 1;
                            ctx.setLineDash([2,6]);
                            ctx.beginPath();
                            ctx.moveTo(px, H_TOP);
                            ctx.lineTo(px, canvas.height);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.fillStyle = '#ffff00';
                            ctx.fillText(`P:${data.pending_hop.toFixed(1)} MHz`, Math.min(px+4, canvas.width-80), H_TOP+22);
                            ctx.restore();
                        }
                    } catch(e) { /* ignore */ }
                }

                // Update Nodes
                const nodeDiv = document.getElementById('nodeContainer');
                if (data.nodes && Object.keys(data.nodes).length > 0) {
                     const nodeHtml = Object.keys(data.nodes).map(nid => {
                        const n = data.nodes[nid];
                        return `<div class="node-card ${n.status}"><div class="node-id">${nid}</div><div class="node-meta"><span>${n.status}</span><span>${n.freq} MHz</span></div></div>`;
                    }).join('');
                    nodeDiv.innerHTML = nodeHtml;
                } else {
                    nodeDiv.innerHTML = '<div style="text-align:center; color:#444; margin-top:20px;">WAITING FOR NODES...</div>';
                }

                // Logs
                const logBox = document.getElementById('logBox');
                if (data.logs.length > 0) {
                    // Check if user is viewing old logs (scrolled up from bottom)
                    const isScrolledToBottom = logBox.scrollHeight - logBox.scrollTop <= logBox.clientHeight + 50;

                    // Render with newest entries last (at bottom)
                    logBox.innerHTML = data.logs.slice().reverse().map(l => `<div class="log-entry">${l}</div>`).join('');

                    // Only auto-scroll to newest (bottom) if user was already at bottom
                    if (isScrolledToBottom) {
                        requestAnimationFrame(() => { logBox.scrollTop = logBox.scrollHeight; });
                    }
                }

                // LOOP: Request next frame ONLY after this one finishes
                setTimeout(update, 50);
            })
            .catch(e => {
                console.log(e);
                // Retry after a longer delay on error
                setTimeout(update, 1000);
            });
    }

    function hop(freq) {
        fetch('/hop', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({freq: freq}) });
    }

    vizPanel.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const freq = START_FREQ + ((x / rect.width) * (END_FREQ - START_FREQ));
        let pwr = "---";
        if (currentSpectrum.length > 0) {
            const index = Math.floor((x / rect.width) * currentSpectrum.length);
            if (currentSpectrum[index]) pwr = currentSpectrum[index].toFixed(1);
        }
        inspector.style.display = 'block';
        inspector.style.left = (x + 15) + 'px';
        inspector.style.top = (y + 15) + 'px';
        inspector.innerHTML = `FREQ: ${freq.toFixed(2)} MHz<br>PWR: ${pwr} dB`;
    });

    vizPanel.addEventListener('mouseleave', () => { inspector.style.display = 'none'; });

    // Initial Start
    setTimeout(resize, 100);
    update(); // Start the loop
</script>
</body>
</html>
