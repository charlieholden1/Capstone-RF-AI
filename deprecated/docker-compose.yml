services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: spectraguard_influx
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCK_INFLUXDB_INIT_MODE=setup
      - DOCK_INFLUXDB_INIT_USERNAME=admin
      - DOCK_INFLUXDB_INIT_PASSWORD=spectraguard_secret
      - DOCK_INFLUXDB_INIT_ORG=spectraguard_org
      - DOCK_INFLUXDB_INIT_BUCKET=spectraguard_bucket
      - DOCK_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb2_data:/var/lib/influxdb2
    networks:
      - spectraguard_net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: spectraguard_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      - spectraguard_net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: spectraguard_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - spectraguard_net

volumes:
  influxdb2_data:
  grafana_data:

networks: